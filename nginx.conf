# ═══════════════════════════════════════════════════════════════
#  Nginx Reverse Proxy — EfeMultiAIbot
#
#  KURULUM:
#    sudo cp nginx.conf /etc/nginx/sites-available/llama-panel
#    sudo ln -sf /etc/nginx/sites-available/llama-panel /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  ÖNEMLİ: SSE (Server-Sent Events) akışı için tamponlama
#  kapatılmalıdır! Aksi halde token-by-token canlı yazma efekti
#  bozulur ve yanıtlar blok halinde gelir.
# ═══════════════════════════════════════════════════════════════

upstream panel_backend {
    server 127.0.0.1:5050;
    keepalive 16;
}

upstream chat_backend {
    server 127.0.0.1:5051;
    keepalive 16;
}

# ── Admin Panel (port 80 veya istediğiniz port) ──────────────
server {
    listen 80;
    server_name panel.localhost;  # Kendi domain'inize göre değiştirin
    client_max_body_size 50m;

    # Genel proxy ayarları
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # ── SSE Endpoint'leri ─────────────────────────────────────
    # Bu lokasyonlar token-by-token akış kullanır.
    # Tamponlama KAPALI olmalıdır!

    # LLM sohbet akışı (admin panel)
    location /api/chat {
        proxy_pass http://panel_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    # Sunucu log akışı
    location /api/logs {
        proxy_pass http://panel_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # Log stream'i uzun süre açık kalabilir
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    # İstatistik canlı akışı
    location /api/stats/stream {
        proxy_pass http://panel_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    # Web chat SSE akışı (admin panel üstünden)
    location /api/webchat/chat {
        proxy_pass http://panel_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    # ── Diğer tüm istekler (normal tamponlama) ────────────────
    location / {
        proxy_pass http://panel_backend;
        proxy_read_timeout 30s;
    }
}

# ── Web Chat Arayüzü ─────────────────────────────────────────
server {
    listen 80;
    server_name chat.localhost;  # Kendi domain'inize göre değiştirin

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # ── SSE: Chat akışı ───────────────────────────────────────
    location /api/send {
        proxy_pass http://chat_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
        add_header X-Accel-Buffering no;
    }

    # ── Diğer istekler ────────────────────────────────────────
    location / {
        proxy_pass http://chat_backend;
        proxy_read_timeout 30s;
    }
}
